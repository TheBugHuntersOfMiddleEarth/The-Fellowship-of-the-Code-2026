<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fellowship Companion - Group Status</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>Fellowship Companion</h1>
  <p>Group Status Dashboard</p>
</header>

<main>

  <!-- Group Overview -->
  <section class="group-overview">
    <h2>Fellowship Members</h2>

    <ul>
      <li>Frodo – Health: Good</li>
      <li>Sam – Health: Good</li>
      <li>Merry – Health: OK</li>
      <li>Pippin – Health: Low</li>
      <li>You – Health: Good</li>
    </ul>
  </section>

  <!-- Member Detail -->
  <section class="member-detail">
    <h2>Update Member Status</h2>

    <form>
      <label for="member">Select Member</label>
      <select id="member">
        <option>Frodo</option>
        <option>Sam</option>
        <option>Merry</option>
        <option>Pippin</option>
        <option>You</option>
      </select>

      <label for="health">Health Status</label>
      <select id="health">
        <option>Good</option>
        <option>OK</option>
        <option>Low</option>
      </select>

      <label for="location">Location</label>
      <input type="text" id="location" placeholder="Enter location" />

      <div class="buttons">
        <button type="submit">Save</button>
        <button type="button">Cancel</button>
      </div>
    </form>

  </section>

</main>

</body>
</html>
