<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Ring Alarm Interface</title>
  <link rel="stylesheet" href="stylesheet_Ring-Alarm-2.css">
</head>
<body>

<header>
  <div class="logo" >[Brand / Ring Icon]</div>
  <h1>RING-ALARM !!!!</h1>
  <small>Header Info</small>
</header>

<main>

  <!-- Alarm Reason -->
  <section class="section">
    <div class="flex">
      <div>
        <h2>Grund:</h2>
        <p class="reason">kritischer Gesundheitswert erreicht!</p>
      </div>
      <div class="icon">[Health Status Icon]</div>
    </div>
  </section>

  <!-- Distance -->
  <section class="section flex">
    <div class="icon">[Distance Icon]</div>
    <div class="distance">Abstand zum Ringträger: 250m</div>
  </section>

  <!-- Map -->
  <section class="section">
    <h3>Karte</h3>
    <div class="map">
      <span class="user">User Position</span>
      <span class="ring">Ring-Träger</span>
      <span class="place">Shire / Hobbiton</span>
    </div>
    <small>Interaktive Zone (Zoom / Pan)</small>
  </section>

  <!-- Action -->
  <section class="section button-area">
    <button>Alarm ausschalten</button>
    <div><small>(Alarm Dismissal)</small></div>
  </section>

</main>

<footer>
  <div>[Kontext Icon 1]</div>
  <div>[Kontext Icon 2]</div>
</footer>

</body>
</html>
