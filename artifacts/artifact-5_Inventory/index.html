<!DOCTYPE html>

<html lang="de">

<head>

```
<!-- Zeichensatz -->
<meta charset="UTF-8">

<!-- Responsive Design -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Verknüpfung zur CSS-Datei -->
<link rel="stylesheet" href="style.css">

<title>The Fellowship Companion</title>
```

</head>

<body>

```
<!-- Kopfbereich -->
<header>
    <h1>💍 The Fellowship Companion</h1>
    <p>One inventory to rule them all.</p>
</header>

<main>

    <!-- Dashboard -->
    <section>
        <h2>🏠 Dashboard</h2>

        <ul>
            <li>🍞 Lembas: 14</li>
            <li>💧 Wasser: 8</li>
            <li>⚔️ Pfeile: 50</li>
        </ul>
    </section>

    <!-- Inventarliste -->
    <section>
        <h2>📦 Inventar</h2>

        <table id="inventory">

            <tr>
                <th>Gegenstand</th>
                <th>Menge</th>
                <th>Besitzer</th>
            </tr>

            <tr>
                <td>Lembas</td>
                <td>14</td>
                <td>Sam</td>
            </tr>

        </table>
    </section>

    <!-- Formular -->
    <section>
        <h2>➕ Neuer Vorrat</h2>

        <form id="form">

            <input id="item" type="text" placeholder="z.B. Athelas" required>

            <input id="amount" type="number" placeholder="Menge" required>

            <button>Hinzufügen</button>

        </form>
    </section>

</main>

<!-- Tolkien-Zitat -->
<footer>
    Not all those who wander are lost.
</footer>

<!-- Verknüpfung zur JavaScript-Datei -->
<script src="script.js"></script>
```

</body>

</html>
