<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#759E70"/>
      <stop offset="52%" stop-color="#4B7B4D"/>
      <stop offset="100%" stop-color="#2E5836"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7A4A16"/>
      <stop offset="22%" stop-color="#C99739"/>
      <stop offset="48%" stop-color="#F7D98A"/>
      <stop offset="74%" stop-color="#B98026"/>
      <stop offset="100%" stop-color="#6A3D11"/>
    </linearGradient>
    <linearGradient id="frameDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A2412"/>
      <stop offset="100%" stop-color="#1D1008"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- bottom plate -->
    <rect x="54" y="38" width="1092" height="176" rx="54" fill="url(#frameDark)"/>

    <!-- main frame -->
    <rect x="40" y="24" width="1120" height="176" rx="56" fill="#20321E" stroke="#132014" stroke-width="8"/>

    <!-- inner gold trim -->
    <rect x="54" y="38" width="1092" height="148" rx="48" fill="url(#bg)" stroke="url(#gold)" stroke-width="8"/>

    <!-- inner bevel -->
    <rect x="72" y="54" width="1056" height="112" rx="38" fill="none" stroke="#FFF7DB" stroke-width="2" opacity="0.60"/>

    <!-- top glow -->
    <rect x="64" y="42" width="1072" height="68" rx="34" fill="url(#topGlow)" opacity="0.92"/>

    <!-- side ornaments -->
    <g filter="url(#glow)">
      <path d="M128 112c10-36 38-54 76-54 40 0 60 22 84 22 18 0 29-6 42-20-6 34-23 54-52 62 29 9 46 29 52 62-13-14-24-20-42-20-24 0-44 22-84 22-38 0-66-18-76-54z" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M1072 112c-10-36-38-54-76-54-40 0-60 22-84 22-18 0-29-6-42-20 6 34 23 54 52 62-29 9-46 29-52 62 13-14 24-20 42-20 24 0 44 22 84 22 38 0 66-18 76-54z" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- center diamond ornaments -->
    <g opacity="0.85">
      <path d="M240 112l22-22 22 22-22 22-22-22z" fill="none" stroke="url(#gold)" stroke-width="5"/>
      <path d="M960 112l22-22 22 22-22 22-22-22z" fill="none" stroke="url(#gold)" stroke-width="5"/>
    </g>

    <!-- subtle rune line -->
    <path d="M370 72h460" stroke="#FFE5A6" stroke-width="2" opacity="0.45"/>
    <path d="M370 152h460" stroke="#122010" stroke-width="2" opacity="0.35"/>

    <!-- outer edge glow -->
    <rect x="52" y="36" width="1096" height="152" rx="50" fill="none" stroke="#FFF0C2" stroke-width="2" opacity="0.7"/>
  </g>
</svg>